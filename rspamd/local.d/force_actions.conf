rules {
  LOCAL_FROM_NEQ_ENVFROM {
    action = "reject";
    expression = "(LOCAL_OUTBOUND | INTERNAL_MAIL) & FROM_NEQ_ENVFROM";
    message = "Sender is forged (different From: header and smtp MAIL FROM: addresses)";
  }

  LOCAL_FORGED_RECIPIENTS {
    action = "reject";
    expression = "(LOCAL_OUTBOUND | INTERNAL_MAIL) & FORGED_RECIPIENTS";
    message = "Recipients are not the same as RCPT TO: mail command";
  }

  RDNS_DNSFAIL {
    action = "soft reject";
    expression = "RDNS_DNSFAIL";
    message = "DNS failure looking up PTR record for client IP address";
  }

  RDNS_NONE {
    action = "soft reject";
    expression = "RDNS_NONE";
    message = "Missing PTR record for client IP address";
  }

  HFILTER_HOSTNAME_UNKNOWN {
    action = "soft reject";
    expression = "HFILTER_HOSTNAME_UNKNOWN";
    message = "Hostname from PTR record for client IP address has a different IP address";
  }

  HFILTER_HELO_BAREIP {
    action = "reject";
    expression = "HFILTER_HELO_BAREIP";
    message = "HELO must be a domain, not an address literal";
  }

  HFILTER_HELO_NOT_FQDN {
    action = "reject";
    expression = "HFILTER_HELO_NOT_FQDN";
    message = "HELO domain must be a valid FQDN";
  }

  HFILTER_HELO_NORES_A_OR_MX {
    action = "soft reject";
    expression = "HFILTER_HELO_NORES_A_OR_MX";
    message = "HELO domain does not have any MX, A or AAAA record";
  }

  HFILTER_HELO_NORESOLVE_MX {
    action = "soft reject";
    expression = "HFILTER_HELO_NORESOLVE_MX";
    message = "HELO domain has one or more MX records but none resolves to an IP";
  }

  HFILTER_HELO_IP_A {
    action = "soft reject";
    expression = "HFILTER_HELO_IP_A";
    message = "HELO domain must resolve to client IP address";
  }

  HFILTER_FROMHOST_NOT_FQDN {
    action = "reject";
    expression = "HFILTER_FROMHOST_NOT_FQDN";
    message = "Return address (SMTP MAIL FROM:) domain must be a valid FQDN";
  }

  HFILTER_FROMHOST_NORES_A_OR_MX {
    action = "soft reject";
    expression = "HFILTER_FROMHOST_NORES_A_OR_MX";
    message = "Return address (SMTP MAIL FROM:) domain does not have any MX, A or AAAA record";
  }

  HFILTER_FROMHOST_NORESOLVE_MX {
    action = "soft reject";
    expression = "HFILTER_FROMHOST_NORESOLVE_MX";
    message = "Return address (SMTP MAIL FROM:) domain has one of more MX records but none resolves to an IP";
  }

  MX_DNS_FAIL {
    action = "soft reject";
    expression = "MX_DNS_FAIL";
    message = "DNS failure checking mail server for return address (SMTP MAIL FROM:) domain";
  }

  MX_NONE {
    action = "soft reject";
    expression = "MX_NONE";
    message = "Return address (SMTP MAIL FROM:) domain does not have any MX, A or AAAA record";
  }

  MX_BROKEN {
    action = "soft reject";
    expression = "MX_BROKEN";
    message = "Return address (SMTP MAIL FROM:) domain has one of more MX records but none resolves to an IP";
  }

  MX_LOCAL_ONLY {
    action = "soft reject";
    expression = "MX_LOCAL_ONLY";
    message = "Return address (SMTP MAIL FROM:) domain only has mail server IPs in private ranges";
  }

  MX_BOGON_ONLY {
    action = "soft reject";
    expression = "MX_BOGON_ONLY";
    message = "Return address (SMTP MAIL FROM:) domain only has mail server IPs in non-routable ranges";
  }

  MX_REFUSED {
    action = "soft reject";
    expression = "MX_REFUSED";
    message = "Return address (SMTP MAIL FROM:) domain mail server rejected connection (TCP RST)";
  }

  MX_A_REFUSED {
    action = "soft reject";
    expression = "MX_A_REFUSED";
    message = "Return address (SMTP MAIL FROM:) domain lacks an MX record and the fallback mail server rejected connection (TCP RST)";
  }

  MX_TIMEOUT_CONNECT {
    action = "soft reject";
    expression = "MX_TIMEOUT_CONNECT";
    message = "Return address (SMTP MAIL FROM:) domain mail server did not respond to connection attempt";
  }

  MX_A_TIMEOUT_CONNECT {
    action = "soft reject";
    expression = "MX_A_TIMEOUT_CONNECT";
    message = "Return address (SMTP MAIL FROM:) domain lacks an MX record and the fallback mail server did not respond to connection attempt";
  }

  MX_INVALID {
    action = "soft reject";
    expression = "MX_INVALID";
    message = "Return address (SMTP MAIL FROM:) domain mail server does not speak SMTP";
  }

  MX_A_INVALID {
    action = "soft reject";
    expression = "MX_A_INVALID";
    message = "Return address (SMTP MAIL FROM:) domain lacks an MX record and the fallback mail server does not speak SMTP";
  }

  DMARC_DNSFAIL {
    action = "soft reject";
    expression = "DMARC_DNSFAIL";
    message = "DMARC temperror";
  }

  SPF_FAIL_WITHOUT_DMARC_POLICY_ALLOW {
    action = "reject";
    expression = "R_SPF_FAIL & !DMARC_POLICY_ALLOW";
    message = "SPF fail";
  }

  SPF_DNSFAIL {
    action = "soft reject";
    expression = "R_SPF_DNSFAIL";
    message = "SPF temperror";
  }

  SPF_PERMFAIL {
    action = "reject";
    expression = "R_SPF_PERMFAIL";
    message = "SPF permerror";
  }

  MISSING_DATE {
    action = "reject";
    expression = "MISSING_DATE";
    message = "Missing Date: header required by RFC 5322";
  }

  INVALID_DATE {
    action = "reject";
    expression = "INVALID_DATE";
    message = "Invalid Date: header not using RFC 5322 format";
  }
}
